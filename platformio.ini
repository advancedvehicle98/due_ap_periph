[env]
platform = atmelsam
board = due
framework = arduino
lib_deps = 
	collin80/due_can@^2.1.6
	collin80/can_common@^0.4.0
	/home/altehex/tmp/dual-vnh5019-motor-shield-master.zip
	derdoktor667/FlyskyIBUS@^0.8.1
	sebnil/DueFlashStorage@^1.0.0

[env:debug]
build_type = debug
build_flags = -D DEBUG

[env:release]
build_type = release
build_flags = -D RELEASE
